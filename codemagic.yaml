workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Set up Gradle permissions
        script: chmod +x ./gradlew

      - name: Clean project
        script: ./gradlew clean

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
